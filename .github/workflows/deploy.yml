name: Build and Deploy Library Services

# Trigger on push to main branch
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout the repository
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2️⃣ Set up Docker Buildx (multi-platform build)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3️⃣ Log in to Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    # 4️⃣ Build and push Docker images
    - name: Build & Push Docker Images
      run: |
        docker build -t yourdockerhub/book-service:latest ./services/book-service
        docker push yourdockerhub/book-service:latest

        docker build -t yourdockerhub/user-service:latest ./services/user-service
        docker push yourdockerhub/user-service:latest

        docker build -t yourdockerhub/borrow-service:latest ./services/borrow-service
        docker push yourdockerhub/borrow-service:latest

        docker build -t yourdockerhub/catalog-service:latest ./services/catalog-service
        docker push yourdockerhub/catalog-service:latest

        docker build -t yourdockerhub/frontend:latest ./frontend
        docker push yourdockerhub/frontend:latest

    # 5️⃣ Set up kubectl to deploy to Kubernetes
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    # 6️⃣ Deploy to Kubernetes using manifests
    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/
        kubectl rollout status deployment/book-deployment
        kubectl rollout status deployment/user-deployment
        kubectl rollout status deployment/borrow-deployment
        kubectl rollout status deployment/catalog-deployment
        kubectl rollout status deployment/frontend-deployment
